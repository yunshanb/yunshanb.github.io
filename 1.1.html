<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            overflow: hidden;
        }
        /* 页面容器统一隐藏/显示 */
        .page {
            width: 100vw;
            height: 100vh;
            display: none;
        }
        .page.active {
            display: flex;
        }

        /* 卡密登录页 */
        #page0 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #222;
            color: #fff;
        }
        .login-box {
            background: #333;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
        }
        #pwd {
            width: 280px;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            outline: none;
        }
        #checkBtn {
            margin-top: 20px;
            width: 280px;
            height: 45px;
            background: #0099ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .tip-text {
            margin-top: 15px;
            color: #ff6666;
            height: 24px;
        }

        /* 主页 page1 樱花+时间+功能 */
        #page1 {
            flex-direction: column;
            align-items: center;
            background: #f8f0f6;
            position: relative;
        }
        #sakuraCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 80px;
        }
        .title {
            font-size: 28px;
            color: #d63384;
            font-weight: bold;
        }
        .time-show {
            font-size: 22px;
            color: #333;
            margin: 20px 0;
        }
        .menu-item {
            display: block;
            width: 220px;
            height: 50px;
            line-height: 50px;
            margin: 15px auto;
            background: #d63384;
            color: #fff;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        /* 炸弹爆炸页 page2 */
        #page2 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        #fireCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99;
            pointer-events: none;
        }
        .bomb-box {
            text-align: center;
            z-index: 10;
        }
        .bomb-icon {
            font-size: 120px;
            color: #ff6600;
            animation: shake 0.3s infinite alternate;
            margin-bottom: 30px;
        }
        .bomb-text {
            color: #ff3333;
            font-size: 24px;
            font-weight: bold;
        }
        @keyframes shake {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        /* 相机页面 page3 */
        #page3 {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #fff;
        }
        #video {
            width: 320px;
            height: 420px;
            border: 4px solid #2ecc71;
            border-radius: 8px;
            transform: scaleX(-1);
        }
        .load-txt {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .cam-result {
            margin-top: 25px;
            font-size: 22px;
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 页面0：卡密登录页 -->
    <div class="page active" id="page0">
        <div class="login-box">
            <h2>请输入卡密</h2>
            <input type="text" id="pwd" placeholder="请输入卡密">
            <button id="checkBtn">验证卡密</button>
            <div class="tip-text" id="loginTip"></div>
        </div>
    </div>

    <!-- 页面1：主页 樱花+时间+功能 -->
    <div class="page" id="page1">
        <canvas id="sakuraCanvas"></canvas>
        <div class="main-content">
            <div class="title">欢迎使用yshtml</div>
            <div class="time-show" id="nowTime"></div>
            <div class="menu">
                <div class="menu-item" onclick="goPage(3)">功能一：查看自己大头照</div>
                <div class="menu-item" onclick="alert('待开发')">功能二</div>
                <div class="menu-item" onclick="alert('待开发')">功能三</div>
            </div>
        </div>
    </div>

    <!-- 页面2：炸弹爆炸页 -->
    <div class="page" id="page2">
        <canvas id="fireCanvas"></canvas>
        <div class="bomb-box">
            <div class="bomb-icon">💣</div>
            <div class="bomb-text">正在执行格机文件...</div>
        </div>
    </div>

    <!-- 页面3：相机页面 -->
    <div class="page" id="page3">
        <div class="load-txt" id="loadText">正在申请相机权限...</div>
        <video id="video" autoplay playsinline></video>
        <div class="cam-result" id="camTip"></div>
    </div>

    <script>
        // 页面切换函数
        function goPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            // 切换到相机页时，再启动相机权限申请
            if(num === 3){
                openCamera();
            }
        }

        // ========== 卡密验证逻辑 ==========
        const pwdInput = document.getElementById('pwd');
        const loginTip = document.getElementById('loginTip');
        const checkBtn = document.getElementById('checkBtn');

        checkBtn.addEventListener('click', function () {
            let val = pwdInput.value.trim();
            if (val === '123456') {
                loginTip.innerText = "检测到白名单，正在跳转...";
                setTimeout(() => goPage(1), 1000);
            } else {
                loginTip.innerText = "检测到密码错误，正在跳转...";
                setTimeout(() => goPage(2), 1000);
            }
        });

        // ========== 页面1：北京时间实时更新 ==========
        function updateTime() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('nowTime').innerText = `北京时间：${h}:${m}:${s}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // ========== 页面1：樱花飘落特效 ==========
        const sakuraCanvas = document.getElementById('sakuraCanvas');
        const sakuraCtx = sakuraCanvas.getContext('2d');
        let sW = sakuraCanvas.width = window.innerWidth;
        let sH = sakuraCanvas.height = window.innerHeight;
        let petals = [];
        const petalNum = 80;

        class Petal {
            constructor() {
                this.x = Math.random() * sW;
                this.y = Math.random() * sH - sH;
                this.r = Math.random() * 4 + 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 2 + 1;
                this.rotate = Math.random() * 360;
                this.rotateSpeed = Math.random() * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotate += this.rotateSpeed;
                if (this.y > sH) {
                    this.y = -10;
                    this.x = Math.random() * sW;
                }
            }
            draw() {
                sakuraCtx.save();
                sakuraCtx.translate(this.x, this.y);
                sakuraCtx.rotate(this.rotate * Math.PI / 180);
                sakuraCtx.beginPath();
                sakuraCtx.arc(0, 0, this.r, 0, Math.PI * 2);
                sakuraCtx.fillStyle = "#ffc0cb";
                sakuraCtx.fill();
                sakuraCtx.restore();
            }
        }

        for (let i = 0; i < petalNum; i++) petals.push(new Petal());
        function renderSakura() {
            sakuraCtx.clearRect(0, 0, sW, sH);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(renderSakura);
        }
        renderSakura();
        window.addEventListener('resize', () => {
            sW = sakuraCanvas.width = window.innerWidth;
            sH = sakuraCanvas.height = window.innerHeight;
        });

        // ========== 页面2：炸弹火花爆炸特效 ==========
        const fireCanvas = document.getElementById('fireCanvas');
        const fireCtx = fireCanvas.getContext('2d');
        let fW = fireCanvas.width = window.innerWidth;
        let fH = fireCanvas.height = window.innerHeight;
        let sparks = [];

        class Spark {
            constructor() {
                this.x = fW / 2;
                this.y = fH / 2;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.r = Math.random() * 3 + 1;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015;
            }
            draw() {
                fireCtx.beginPath();
                fireCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                fireCtx.fillStyle = `rgba(255,${Math.floor(Math.random()*100)},0,${this.alpha})`;
                fireCtx.fill();
            }
        }

        function createSpark() {
            for (let i = 0; i < 8; i++) sparks.push(new Spark());
        }
        setInterval(createSpark, 100);
        function renderFire() {
            fireCtx.clearRect(0, 0, fW, fH);
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.update();
                s.draw();
                if (s.alpha <= 0) sparks.splice(i, 1);
            }
            requestAnimationFrame(renderFire);
        }
        renderFire();
        window.addEventListener('resize', () => {
            fW = fireCanvas.width = window.innerWidth;
            fH = fireCanvas.height = window.innerHeight;
        });

        // ========== 页面3：前置摄像头调用（改为进入页面后执行） ==========
        const video = document.getElementById('video');
        const loadText = document.getElementById('loadText');
        const camTip = document.getElementById('camTip');

        async function openCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });
                video.srcObject = stream;
                loadText.innerText = "";
                camTip.innerText = "相机入侵成功";
            } catch (err) {
                loadText.innerText = "相机权限获取失败，请允许相机权限";
            }
        }
    </script>
</body>
</html>

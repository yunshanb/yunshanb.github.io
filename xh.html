<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>好感度互动小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            overflow: hidden;
            position: relative;
        }
        /* 好感度文字数字 */
        .favor-num {
            font-size: 22px;
            margin-bottom: 10px;
            color: #333;
        }
        /* 好感度进度条容器 */
        .progress-box {
            width: 300px;
            height: 20px;
            border: 2px solid #666;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #eee;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ff6b81;
            transition: width 0.2s ease;
        }
        /* 地面：让人物在底部行走 */
        .ground {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
        }
        /* 人物容器 */
        .human-box {
            cursor: pointer;
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 70px;
            height: 140px;
            transition: transform 0.1s;
            transform-origin: center bottom;
        }
        .human-box:hover {
            transform: scale(1.05);
        }
        /* 点击晃动动画 */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        /* 左右移动走路 */
        @keyframes walkLeftRight {
            0% {
                transform: translateX(-180px) scaleX(1);
            }
            45% {
                transform: translateX(180px) scaleX(1);
            }
            50% {
                transform: translateX(180px) scaleX(-1);
            }
            95% {
                transform: translateX(-180px) scaleX(-1);
            }
            100% {
                transform: translateX(-180px) scaleX(1);
            }
        }
        .walk-left-right {
            animation: walkLeftRight 8s linear infinite;
        }
        /* 拟人头部 */
        .head {
            width: 36px;
            height: 36px;
            border: 3px solid #222;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            background: #fff;
            overflow: hidden;
        }
        /* 眼睛嘴巴容器 */
        .face {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: all 0.3s;
        }
        /* 普通表情 */
        .normal-face .eye-left, .normal-face .eye-right {
            width: 5px;
            height: 5px;
            background: #222;
            border-radius: 50%;
            position: absolute;
            top: 12px;
        }
        .normal-face .eye-left { left: 8px; }
        .normal-face .eye-right { right: 8px; }
        .normal-face .mouth {
            width: 10px;
            height: 2px;
            background: #222;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 1px;
        }
        /* 害羞表情 */
        .shy-face {
            display: none;
        }
        .shy-face .eye-left, .shy-face .eye-right {
            width: 8px;
            height: 3px;
            background: #222;
            position: absolute;
            top: 13px;
            border-radius: 3px;
        }
        .shy-face .eye-left { left: 7px; transform: rotate(10deg); }
        .shy-face .eye-right { right: 7px; transform: rotate(-10deg); }
        .shy-face .mouth {
            width: 12px;
            height: 6px;
            border: 2px solid #222;
            border-top: none;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }
        /* 身体躯干 */
        .body {
            width: 6px;
            height: 45px;
            background: #222;
            margin: 0 auto;
        }
        /* 手臂 */
        .arm-left, .arm-right {
            width: 35px;
            height: 4px;
            background: #222;
            position: absolute;
            top: 46px;
            border-radius: 2px;
            transform-origin: left center;
        }
        .arm-left {
            left: 10px;
            transform: rotate(25deg);
        }
        .arm-right {
            right: 10px;
            transform: rotate(-25deg);
            transform-origin: right center;
        }
        /* 腿部 */
        .leg-left, .leg-right {
            width: 4px;
            height: 50px;
            background: #222;
            position: absolute;
            top: 90px;
            border-radius: 2px;
            transform-origin: top center;
        }
        .leg-left {
            left: 33px;
            transform: rotate(18deg);
        }
        .leg-right {
            right: 33px;
            transform: rotate(-18deg);
        }
        /* 弹窗通用样式 */
        .dialog {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 30px;
            background: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 12px;
            z-index: 999;
            display: none;
            text-align: center;
        }
        .dialog p {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .btn-group button {
            padding: 8px 20px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-yes {
            background: #52c41a;
            color: white;
        }
        .btn-no {
            background: #ff4d4f;
            color: white;
        }
        .btn-leave {
            background: #888;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 数字好感度 -->
    <div class="favor-num">好感度：<span id="numText">0</span>/100</div>
    <!-- 好感进度条 -->
    <div class="progress-box">
        <div class="progress-bar" id="bar"></div>
    </div>

    <!-- 地面 -->
    <div class="ground"></div>

    <!-- 拟人人物 -->
    <div class="human-box walk-left-right" id="char">
        <div class="head">
            <!-- 普通表情 -->
            <div class="face normal-face">
                <div class="eye-left"></div>
                <div class="eye-right"></div>
                <div class="mouth"></div>
            </div>
            <!-- 害羞表情 -->
            <div class="face shy-face">
                <div class="eye-left"></div>
                <div class="eye-right"></div>
                <div class="mouth"></div>
            </div>
        </div>
        <div class="body"></div>
        <div class="arm-left"></div>
        <div class="arm-right"></div>
        <div class="leg-left"></div>
        <div class="leg-right"></div>
    </div>

    <!-- 临时提示弹窗 -->
    <div class="dialog" id="tipDialog">
        <p id="tipText">别碰我</p>
    </div>

    <!-- 告白选择弹窗 -->
    <div class="dialog" id="loveDialog">
        <p>我喜欢你</p>
        <div class="btn-group">
            <button class="btn-yes" id="accept">接受</button>
            <button class="btn-no" id="refuse">拒绝</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="dialog" id="resultDialog">
        <p id="resultText"></p>
        <button class="btn-leave" id="leaveBtn" style="display:none;">离开</button>
    </div>

    <script>
        // 变量
        let favor = 0;
        const bar = document.getElementById('bar');
        const numText = document.getElementById('numText');
        const char = document.getElementById('char');
        const tipDialog = document.getElementById('tipDialog');
        const tipText = document.getElementById('tipText');
        const loveDialog = document.getElementById('loveDialog');
        const resultDialog = document.getElementById('resultDialog');
        const resultText = document.getElementById('resultText');
        const leaveBtn = document.getElementById('leaveBtn');
        const normalFace = document.querySelector('.normal-face');
        const shyFace = document.querySelector('.shy-face');

        // 点击人物事件
        char.addEventListener('click', () => {
            if (favor >= 100) return;

            // 点击晃动动画
            char.classList.add('shake');
            setTimeout(() => {
                char.classList.remove('shake');
            }, 300);

            // 每次点击增加2点好感
            favor += 2;
            bar.style.width = favor + '%';
            numText.innerText = favor;

            // 好感大于等于20时，弹窗文字改为打咩
            if(favor >= 20){
                tipText.innerText = '打咩';
            }else{
                tipText.innerText = '别碰我';
            }

            // 好感越高，切换害羞表情
            if (favor > 30) {
                normalFace.style.display = 'none';
                shyFace.style.display = 'block';
            }

            // 弹出提示，5秒消失
            tipDialog.style.display = 'block';
            setTimeout(() => {
                tipDialog.style.display = 'none';
            }, 5000);

            // 满100触发告白
            if (favor >= 100) {
                // 停止左右走路
                char.classList.remove('walk-left-right');
                // 让人物面向屏幕
                char.style.transform = 'translateX(-50%) scaleX(1)';
                setTimeout(() => {
                    loveDialog.style.display = 'block';
                }, 300);
            }
        });

        // 接受
        document.getElementById('accept').addEventListener('click', () => {
            loveDialog.style.display = 'none';
            resultText.innerText = '最喜欢你了';
            resultDialog.style.display = 'block';
            leaveBtn.style.display = 'none';
        });

        // 拒绝
        document.getElementById('refuse').addEventListener('click', () => {
            loveDialog.style.display = 'none';
            resultText.innerText = '曾经沧海难为水，除却巫山不是云';
            resultDialog.style.display = 'block';
            leaveBtn.style.display = 'block';
        });

        // 离开按钮：关闭当前页面
        leaveBtn.addEventListener('click', () => {
            window.close();
        });
    </script>
</body>
</html>

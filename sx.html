<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #050510, #101030);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 页面通用 */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }
        .page.active {
            display: flex;
        }

        /* 登录页 */
        .logo-title {
            font-size: 50px;
            font-weight: bold;
            color: #ff3a3a;
            text-shadow: 0 0 20px #ff3a3a;
            margin-bottom: 50px;
        }

        .input-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 35px 45px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 25px rgba(255,50,50,0.25);
        }

        .input-card h3 {
            margin-bottom: 25px;
            font-size: 20px;
            color: #eaeaea;
            text-align: center;
        }

        #pwdInput {
            width: 240px;
            height: 50px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #ff3a3a;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            color: #fff;
            outline: none;
        }

        .submit-btn {
            width: 240px;
            height: 50px;
            margin-top: 18px;
            background: #ff3a3a;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 19px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #ff1a1a;
            box-shadow: 0 0 15px #ff3a3a;
        }

        /* 悬浮提示 */
        .float-tip {
            position: fixed;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 14px 30px;
            border-radius: 40px;
            border: 1px solid #39ff77;
            color: #39ff77;
            font-size: 17px;
            z-index: 9999;
            display: none;
            animation: fadeDown 0.5s ease;
        }

        @keyframes fadeDown {
            from {top: -60px; opacity: 0;}
            to {top: 35px; opacity: 1;}
        }

        /* 加载页 */
        .load-text {
            font-size: 24px;
            margin-bottom: 35px;
            color: #39c8ff;
            text-shadow: 0 0 12px #39c8ff;
        }

        .progress-box {
            width: 340px;
            height: 28px;
            background: rgba255(255,255,0.1);
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #39c8ff;
            background: rgba(255,255,255,0.08);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #39c8ff, #5577ff);
            border-radius: 40px;
            transition: width 0.04s linear;
        }

        /* 入侵成功页 */
        .success-title {
            font-size: 65px;
            font-weight: bold;
            color: #ff2b2b;
            text-shadow: 0 0 25px #ff0000;
            letter-spacing: 10px;
        }

        .sub-text {
            font-size: 22px;
            color: #cccccc;
            margin: 15px 0;
        }

        #camera {
            width: 340px;
            height: 260px;
            border-radius: 15px;
            border: 2px solid #ff3a3a;
            background: #000;
            transform: scaleX(-1);
            margin: 20px 0;
        }

        .time-box {
            font-size: 20px;
            color: #4cd964;
            margin: 10px 0;
            text-shadow: 0 0 8px #4cd964;
        }

        .game-btn {
            margin-top: 25px;
            padding: 14px 35px;
            background: #7b2cbf;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-btn:hover {
            background: #5a189a;
            box-shadow: 0 0 15px #7b2cbf;
        }
    </style>
</head>
<body>
    <!-- 悬浮提示 -->
    <div class="float-tip" id="floatTip">检测到白名单用户即将进入</div>

    <!-- 第一页：卡网输入 -->
    <div class="page active" id="loginPage">
        <div class="logo-title">FOX服务器</div>
        <div class="input-card">
            <h3>请输入卡网密钥</h3>
            <input type="text" id="pwdInput" placeholder="输入密钥">
            <button class="submit-btn" onclick="checkPwd()">确认进入</button>
        </div>
    </div>

    <!-- 第二页：加载进度 -->
    <div class="page" id="loadPage">
        <div class="load-text">正在尝试进入腾讯服务器[白名单]</div>
        <div class="progress-box">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- 第三页：入侵成功 + 摄像头 + 时间 + 王者按钮 -->
    <div class="page" id="successPage">
        <div class="success-title">入侵成功</div>
        <div class="sub-text">服务器连接正常</div>
        <video id="camera" autoplay playsinline muted></video>
        <div class="time-box" id="beijingTime"></div>
        <button class="game-btn" onclick="jumpGame()">入侵王者荣耀</button>
    </div>

    <script>
        const rightPwd = "91";
        let progress = 0;
        let timeTimer;

        // 校验密码
        function checkPwd() {
            let val = document.getElementById('pwdInput').value.trim();
            if (val === rightPwd) {
                document.getElementById('floatTip').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('floatTip').style.display = 'none';
                    switchPage('loadPage');
                    startProgress();
                }, 1500);
            } else {
                alert('密钥错误，请重新输入');
            }
        }

        // 切换页面
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 进度条动画
        function startProgress() {
            const bar = document.getElementById('progressBar');
            progress = 0;
            let timer = setInterval(() => {
                progress++;
                bar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        switchPage('successPage');
                        openCamera();
                        startTime();
                    }, 600);
                }
            }, 35);
        }

        // 调用前置摄像头
        function openCamera() {
            const video = document.getElementById('camera');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                }).then(stream => {
                    video.srcObject = stream;
                }).catch(() => {
                    alert('请允许摄像头权限才能正常显示');
                });
            } else {
                alert('当前浏览器不支持摄像头');
            }
        }

        // 实时北京时间
        function startTime() {
            updateTime();
            timeTimer = setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('beijingTime').innerText = 
                `北京时间：${year}年${month}月${day}日 ${h}:${m}:${s}`;
        }

        // 跳转王者荣耀
        function jumpGame() {
            // 王者协议跳转，手机会自动唤起王者荣耀APP
            window.location.href = "wzry://";
        }
    </script>
</body>
</html>

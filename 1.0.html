<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密验证系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }
        /* 卡密输入页样式 */
        .login-box {
            text-align: center;
            padding: 30px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px #ccc;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        #pwdInput {
            width: 280px;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            border: 1px solid #999;
            border-radius: 5px;
            outline: none;
        }
        #submitBtn {
            margin-top: 15px;
            width: 120px;
            height: 42px;
            font-size: 16px;
            background: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #submitBtn:hover {
            background: #1b76d8;
        }

        /* 主页样式（yshtml页面） */
        .main-page {
            display: none;
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }
        .main-page h1 {
            color: #222;
            margin-bottom: 20px;
        }
        .time-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        .func-item {
            display: block;
            width: 200px;
            height: 50px;
            line-height: 50px;
            margin: 15px auto;
            background: #409eff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 17px;
        }
        .func-item:hover {
            background: #66b1ff;
        }

        /* 炸弹格机页面 */
        .bomb-page {
            display: none;
            text-align: center;
        }
        .bomb-img {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
        }
        .tip-text {
            font-size: 22px;
            color: #ff3333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 1. 卡密输入页面（默认显示） -->
    <div class="login-box" id="loginPage">
        <h2>请输入卡密</h2>
        <input type="text" id="pwdInput" placeholder="请输入卡密">
        <br>
        <button id="submitBtn">提交验证</button>
    </div>

    <!-- 2. 验证成功页面（1页面） -->
    <div class="main-page" id="mainPage">
        <h1>欢迎使用yshtml</h1>
        <div class="time-text" id="nowTime"></div>
        <a href="javascript:;" class="func-item" onclick="alert('功能一：待开发')">功能一</a>
        <a href="javascript:;" class="func-item" onclick="alert('功能二：待开发')">功能二</a>
        <a href="javascript:;" class="func-item" onclick="alert('功能三：待开发')">功能三</a>
    </div>

    <!-- 3. 密码错误页面（炸弹格机页） -->
    <div class="bomb-page" id="errorPage">
        <!-- 网络炸弹图片，可正常加载 -->
        <img class="bomb-img" src="https://img.icons8.com/fluency/200/000000/bomb.png" alt="炸弹">
        <div class="tip-text">正在执行格机文件...</div>
    </div>

    <script>
        // 获取元素
        const loginPage = document.getElementById('loginPage');
        const mainPage = document.getElementById('mainPage');
        const errorPage = document.getElementById('errorPage');
        const pwdInput = document.getElementById('pwdInput');
        const submitBtn = document.getElementById('submitBtn');
        const timeDom = document.getElementById('nowTime');

        // 实时更新北京时间
        function updateTime() {
            const now = new Date();
            timeDom.innerText = "北京时间：" + now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        setInterval(updateTime, 1000);

        // 卡密验证逻辑
        submitBtn.addEventListener('click', function() {
            const pwd = pwdInput.value.trim();
            if (pwd === '123456') {
                alert('检测到白名单，验证通过！');
                loginPage.style.display = 'none';
                mainPage.style.display = 'block';
                updateTime();
            } else {
                alert('检测到密码错误！');
                loginPage.style.display = 'none';
                errorPage.style.display = 'block';
            }
        });
    </script>
</body>
</html>

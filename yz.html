<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YS 拦截状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b132b;
            font-family: "Microsoft Yahei", sans-serif;
            /* 垂直水平居中所有内容 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* 渐变标题文字 */
        .title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff7eb3, #ffd700, #72efdd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }
        /* 北京时间样式 */
        .time {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        /* 红色提示文字 */
        .tip {
            font-size: 20px;
            color: #ff4444;
            font-weight: 500;
        }
        /* 樱花花瓣样式 + 动画 */
        .sakura {
            position: fixed;
            top: -15px;
            width: 12px;
            height: 12px;
            background: #ffc0cb;
            border-radius: 50%;
            opacity: 0.85;
            pointer-events: none;
            animation: sakuraFall linear infinite;
        }
        /* 花瓣下落动画关键帧 */
        @keyframes sakuraFall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>
    <!-- 主内容区域 -->
    <h1 class="title">ys拦截成功</h1>
    <div class="time" id="beijingTime"></div>
    <div class="tip">本拦截不会自动关闭需执行恢复文件</div>

    <!-- 背景音乐 FLAC 循环播放 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="Paperman-Life Struggle (宿命).flac" type="audio/flac">
        当前浏览器不支持FLAC音频格式
    

    <script>
        // ========== 1. 背景音乐处理（解决浏览器自动播放限制） ==========
        const bgMusic = document.getElementById('bgMusic');
        // 点击页面任意位置播放音乐
        document.body.addEventListener('click', () => {
            bgMusic.play();
        }, { once: true });

        // ========== 2. 实时北京时间 ==========
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('beijingTime').innerText = `北京时间：${timeStr}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // ========== 3. 樱花飘落特效（完整修复） ==========
        function createSakura() {
            // 创建花瓣元素
            const sakura = document.createElement('div');
            sakura.classList.add('sakura');

            // 随机花瓣大小
            const size = Math.random() * 15 + 8;
            sakura.style.width = `${size}px`;
            sakura.style.height = `${size}px`;

            // 随机水平位置（全屏左右）
            sakura.style.left = `${Math.random() * 100}vw`;

            // 随机下落速度 4~9秒
            const fallTime = Math.random() * 5 + 4;
            sakura.style.animationDuration = `${fallTime}s`;

            // 添加到页面
            document.body.appendChild(sakura);

            // 花瓣落地后自动删除，避免元素堆积
            setTimeout(() => {
                sakura.remove();
            }, fallTime * 1000);
        }
        // 持续生成花瓣（每100ms一个，密度适中）
        setInterval(createSakura, 100);
    </script>
</body>
</html>

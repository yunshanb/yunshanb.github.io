<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YS 拦截状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* 背景图+半透明遮罩，自行替换图片名 */
            background: url('bg.jpg') center center / cover no-repeat;
            background-color: rgba(0, 0, 0, 0.35);
            background-blend-mode: darken;
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff7eb3, #ffd700, #72efdd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.6));
        }
        .time {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 3px rgba(0,0,0.8));
        }
        .tip {
            font-size: 20px;
            color: #ff4444;
            font-weight: 500;
            filter: drop-shadow(0 0 3px rgba(0,0,0.8));
        }
        .sakura {
            position: fixed;
            top: -15px;
            width: 12px;
            height: 12px;
            background: #ffc0cb;
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
            animation: sakuraFall linear infinite;
        }
        @keyframes sakuraFall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
            }
        }
        /* 隐藏音频标签 */
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <h1 class="title">ys拦截成功</h1>
    <div class="time" id="beijingTime"></div>
    <div class="tip">本拦截不会自动关闭需执行恢复文件</div>

    <!-- 隐藏式背景音乐，AAC格式，循环播放 -->
    <audio id="bgMusic" autoplay muted loop preload="auto">
        <source src="背景音乐.aac" type="audio/aac">
        您的浏览器不支持AAC音频格式
    

    <script>
        const bgMusic = document.getElementById('bgMusic');
        // 点击页面任意位置解除静音，开始播放声音
        document.addEventListener('click', () => {
            bgMusic.muted = false;
            bgMusic.volume = 1;
        }, { once: true });

        // 实时更新北京时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('beijingTime').innerText = `北京时间：${timeStr}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 樱花飘落特效
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.classList.add('sakura');
            const size = Math.random() * 15 + 8;
            sakura.style.width = `${size}px`;
            sakura.style.height = `${size}px`;
            sakura.style.left = `${Math.random() * 100}vw`;
            const fallTime = Math.random() * 5 + 4;
            sakura.style.animationDuration = `${fallTime}s`;
            document.body.appendChild(sakura);
            setTimeout(() => sakura.remove(), fallTime * 1000);
        }
        setInterval(createSakura, 100);
    </script>
</body>
</html>

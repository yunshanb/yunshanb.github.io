<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YS 拦截状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b132b;
            font-family: "Microsoft Yahei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* 渐变标题文字 */
        .title {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff7eb3, #ffd700, #72efdd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        /* 北京时间 */
        .time {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        /* 红色提示文字 */
        .tip {
            font-size: 20px;
            color: #ff4444;
            font-weight: 500;
        }
        /* 樱花花瓣样式 */
        .sakura {
            position: fixed;
            top: -10px;
            background: #ffc0cb;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
        }
        /* 飘落动画 */
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>
    <h1 class="title">ys拦截成功</h1>
    <div class="time" id="beijingTime"></div>
    <div class="tip">本拦截不会自动关闭需执行恢复文件</div>

    <script>
        // 1. 实时更新北京时间
        function updateTime() {
            const now = new Date();
            const options = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const timeStr = now.toLocaleTimeString('zh-CN', options);
            document.getElementById('beijingTime').innerText = "北京时间：" + timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 2. 樱花飘落特效
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.classList.add('sakura');
            // 随机大小
            const size = Math.random() * 12 + 6;
            sakura.style.width = size + 'px';
            sakura.style.height = size + 'px';
            // 随机水平位置
            sakura.style.left = Math.random() * 100 + 'vw';
            // 随机下落时长
            const duration = Math.random() * 6 + 4;
            sakura.style.animationDuration = duration + 's';
            document.body.appendChild(sakura);
            // 花瓣落地后移除
            setTimeout(() => {
                sakura.remove();
            }, duration * 1000);
        }
        // 持续生成花瓣
        setInterval(createSakura, 120);
    </script>
</body>
</html>
